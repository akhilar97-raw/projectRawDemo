<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TAG Restaurant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
      color: #f0f0f0;
    }

    .btn {
      padding: 15px 35px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background-color: #ff7b00;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
    }

    .btn:hover {
      background-color: #e66a00;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to TAG Restaurant</h1>
    <p>Experience delicious food, rich flavors, and unforgettable moments.</p>
    
    <!-- Link this to your menu page -->
    <a href="foodweb.html" class="btn">View Menu</a>
  </div>

</body>
</html>
